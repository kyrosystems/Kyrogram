name: Kyrogram Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libraylib-dev libmbedtls-dev cmake build-essential libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxkbcommon-dev libgl1-mesa-dev
      
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install raylib mbedtls cmake
        
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install raylib:x64-windows mbedtls:x64-windows
          
      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release
